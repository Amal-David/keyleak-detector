name: 'KeyLeak Detector'
description: >
  Scan for exposed API keys, BaaS misconfigurations (Supabase RLS, Firebase rules),
  and secrets in your codebase and preview deployments. Supports local file scanning,
  browser-based scanning of live URLs, and BaaS active validation.
author: 'Amal David'
branding:
  icon: 'shield'
  color: 'green'
inputs:
  mode:
    description: 'Scan mode: local (files only), browser (live URL), or both.'
    required: false
    default: 'local'
  url:
    description: 'URL to scan in browser mode (e.g., preview deployment URL).'
    required: false
    default: ''
  baas-validate:
    description: 'Enable active BaaS validation probes (Supabase RLS, Firebase rules).'
    required: false
    default: 'false'
  fail-on:
    description: 'Severity threshold to fail the check (low|medium|high|critical).'
    required: false
    default: 'high'
  launch-profile:
    description: 'Launch profile (launch-gate|local-dev|bug-bounty|ci|full).'
    required: false
    default: 'ci'
  allowlist:
    description: 'Path to allowlist (.yaml or .txt).'
    required: false
    default: 'keyleak-allowlist.yaml'
  output-format:
    description: 'Output format: json, sarif, markdown, or html.'
    required: false
    default: 'json'
  python-version:
    description: 'Python version for the runner.'
    required: false
    default: '3.12'
outputs:
  verdict:
    description: 'Scan verdict: SAFE_TO_SHIP, REVIEW, or BLOCK_SHIP'
    value: ${{ steps.scan.outputs.verdict }}
  findings-count:
    description: 'Total number of findings'
    value: ${{ steps.scan.outputs.findings_count }}
  report-path:
    description: 'Path to the generated report file'
    value: ${{ steps.scan.outputs.report_path }}
runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install KeyLeak
      shell: bash
      env:
        KL_MODE: ${{ inputs.mode }}
        KL_ACTION_PATH: ${{ github.action_path }}
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e "$KL_ACTION_PATH"
        if [ "$KL_MODE" = "browser" ] || [ "$KL_MODE" = "both" ]; then
          python -m pip install playwright
          python -m playwright install chromium --with-deps
        fi

    - name: Run KeyLeak scan
      id: scan
      shell: bash
      env:
        GITHUB_TOKEN: ''
        # All user-controlled inputs flow through env vars — never interpolate
        # ${{ inputs.* }} directly into the shell (GitHub Actions script injection).
        KL_MODE: ${{ inputs.mode }}
        KL_URL: ${{ inputs.url }}
        KL_FORMAT: ${{ inputs.output-format }}
        KL_FAILON: ${{ inputs.fail-on }}
        KL_PROFILE: ${{ inputs.launch-profile }}
        KL_ALLOWLIST: ${{ inputs.allowlist }}
        KL_BAAS: ${{ inputs.baas-validate }}
      run: |
        FORMAT_FLAG="--json"
        [ "$KL_FORMAT" = "sarif" ] && FORMAT_FLAG="--sarif"
        [ "$KL_FORMAT" = "markdown" ] && FORMAT_FLAG="--markdown"
        [ "$KL_FORMAT" = "html" ] && FORMAT_FLAG="--html"

        VERDICT="SAFE_TO_SHIP"
        FINDINGS=0
        REPORT="keyleak-report.$KL_FORMAT"

        # Local scan
        if [ "$KL_MODE" = "local" ] || [ "$KL_MODE" = "both" ]; then
          ALLOWLIST_FLAG=""
          [ -n "$KL_ALLOWLIST" ] && [ -f "$KL_ALLOWLIST" ] && ALLOWLIST_FLAG="--allowlist $KL_ALLOWLIST"

          keyleak self-audit . --fail-on "$KL_FAILON" || true

          keyleak local . \
            --launch-profile "$KL_PROFILE" \
            $ALLOWLIST_FLAG \
            $FORMAT_FLAG \
            --fail-on "$KL_FAILON" > "$REPORT" || VERDICT="BLOCK_SHIP"
        fi

        # Browser scan
        if [ "$KL_MODE" = "browser" ] || [ "$KL_MODE" = "both" ]; then
          if [ -n "$KL_URL" ]; then
            BAAS_FLAG=""
            [ "$KL_BAAS" = "true" ] && BAAS_FLAG="--baas-validate"

            keyleak browser-scan "$KL_URL" \
              $BAAS_FLAG \
              $FORMAT_FLAG \
              --fail-on "$KL_FAILON" > "keyleak-browser-report.$KL_FORMAT" || VERDICT="BLOCK_SHIP"

            REPORT="keyleak-browser-report.$KL_FORMAT"
          fi
        fi

        echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
        echo "report_path=$REPORT" >> "$GITHUB_OUTPUT"

        if [ -f "$REPORT" ] && [ "$KL_FORMAT" = "json" ]; then
          FINDINGS=$(REPORT_PATH="$REPORT" python -c "import json,os; r=json.load(open(os.environ['REPORT_PATH'])); print(r.get('summary',{}).get('total_findings',0))" 2>/dev/null || echo 0)
        fi
        echo "findings_count=$FINDINGS" >> "$GITHUB_OUTPUT"

    - name: Upload report artifact
      if: always()
      uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
      with:
        name: keyleak-report
        path: keyleak-*-report.*
        if-no-files-found: ignore
