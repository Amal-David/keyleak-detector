# Automated PyPI publish on GitHub Release.
#
# Uses PyPI **Trusted Publishing** (OIDC) — no API token is stored in the repo.
# One-time setup on PyPI (https://pypi.org/manage/project/keyleak-detector/settings/publishing/):
#   Add a trusted publisher →
#     Owner: Amal-David   Repository: keyleak-detector
#     Workflow: publish.yml   (leave Environment blank)
#
# To cut a release: bump the version in pyproject.toml + keyleak/__init__.py,
# update CHANGELOG.md, then publish a GitHub Release tagged `vX.Y.Z`. This
# workflow builds, verifies the package version equals the tag, and uploads.
#
# Supply-chain hygiene (per CLAUDE.md): every `uses:` is SHA-pinned; this is a
# release-triggered workflow, separate from CI, and shares no secrets with it.
name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  pypi-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Verify package version matches the release tag
        run: |
          # Guards against the 0.5.4-vs-0.6.0 mismatch class: refuse to publish
          # if the built version doesn't equal the vX.Y.Z release tag.
          PKG_VER="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          TAG_VER="${GITHUB_REF_NAME#v}"
          echo "package=$PKG_VER tag=$TAG_VER"
          if [ "$PKG_VER" != "$TAG_VER" ]; then
            echo "::error::pyproject version ($PKG_VER) != release tag ($TAG_VER)"; exit 1
          fi
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
